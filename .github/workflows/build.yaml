name: build fastapi server image, push to image registry and deploy make argocd detect the changes

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - serve.py
  workflow_dispatch:


jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
  
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image and push it
        uses: docker/build-push-action@v6 
        with:
          push: true
          tags: nourbenmoulehom134/iris-mlops:${{ steps.tag.outputs.tag }}
      
      - name: Update image tag in iris-deployment.yaml
        run: |
          sed -i "s|nourbenmoulehom134/iris-mlops:.*|nourbenmoulehom134/iris-mlops:${{ steps.tag.outputs.tag }}|" k8s/iris-deployment.yaml

      - name: Commit and push manifest Update
        run: |
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add k8s/iris-deployment.yaml
            git commit -m "ci: update iris-mlops to ${{ steps.tag.outputs.tag }} [skip ci]"
            git push
